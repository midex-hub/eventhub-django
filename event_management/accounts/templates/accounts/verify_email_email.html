<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Verify your email</title></head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto;">
  <div style="background: linear-gradient(135deg, #ff4d00, #ff6a00); padding: 30px; text-align: center; border-radius: 12px 12px 0 0;">
    <h1 style="color: white; margin: 0; font-size: 24px;">EventHub</h1>
  </div>
  <div style="padding: 30px; background: #fff; border: 1px solid #e0e0e0; border-top: none;">
    <h2 style="color: #1a1a1a;">Welcome, {{ user.first_name }}!</h2>
    <p>Use the code below to verify your email:</p>
    <div style="text-align: center; margin: 30px 0;">
      <span style="font-size: 36px; font-weight: bold; letter-spacing: 8px; color: #ff4d00;">{{ code }}</span>
    </div>
    <p>Enter this code on the verification page to activate your account.</p>
    <p>This code expires in 24 hours.</p>
    <p>If you didn't create an account, ignore this email.</p>
    <hr style="border: none; border-top: 1px solid #e0e0e0; margin: 20px 0;">
    <p style="font-size: 12px; color: #666;">Best regards,<br>The EventHub Team</p>
  </div>
</body>
</html>
