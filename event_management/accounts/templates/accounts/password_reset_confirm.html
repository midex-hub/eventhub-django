{% extends 'base.html' %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div style="min-height: calc(100vh - 72px); display: flex; align-items: center; padding: 3rem 0;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem;">
          <h2 style="font-family: 'Syne', sans-serif; margin-bottom: 1.5rem;">Set New Password</h2>
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
            {% endfor %}
          {% endif %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input type="password" name="password" class="form-control" minlength="8" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <input type="password" name="confirm" class="form-control" minlength="8" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Reset Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
