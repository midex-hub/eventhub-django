{% extends 'base.html' %}
{% block title %}Enter Reset Code{% endblock %}
{% block content %}
<div style="min-height: calc(100vh - 72px); display: flex; align-items: center; padding: 3rem 0;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem;">
          <h2 style="font-family: 'Syne', sans-serif; margin-bottom: 1.5rem;">Enter Reset Code</h2>
          <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Enter the 6-digit code sent to your email.</p>
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
            {% endfor %}
          {% endif %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Email address</label>
              <input type="email" name="email" class="form-control" value="{{ email }}" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Verification code</label>
              <input type="text" name="code" class="form-control form-control-lg text-center" placeholder="000000" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" required style="font-size: 1.5rem; letter-spacing: 8px;">
            </div>
            <button type="submit" class="btn btn-primary w-100">Verify Code</button>
          </form>
          <div class="text-center mt-3">
            <a href="{% url 'password_reset' %}" style="color: var(--accent); font-size: 0.85rem;">Request new code</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
