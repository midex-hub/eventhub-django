{% extends 'base.html' %}
{% block title %}Sign In{% endblock %}
{% block content %}
<div style="min-height: calc(100vh - 72px); display: flex; align-items: center; padding: 3rem 0; background: radial-gradient(ellipse at 50% 0%, rgba(255,77,0,0.08) 0%, transparent 60%);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-xl-4">
        <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem;">
          <div class="text-center mb-4">
            <a href="{% url 'home' %}" style="font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; text-decoration: none; color: var(--text);">Event<span style="color: var(--accent);">Hub</span></a>
            <h2 style="margin-top: 1.5rem; font-size: 1.75rem;">Welcome back</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Sign in to your account</p>
          </div>
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" placeholder="Enter your username" value="{{ form.username.value|default:'' }}" autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" placeholder="Enter your password">
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
              <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-muted); font-size: 0.875rem;">
                <input type="checkbox" style="accent-color: var(--accent);"> Remember me
              </label>
              <a href="{% url 'password_reset' %}" style="color: var(--accent); font-size: 0.875rem; text-decoration: none;">Forgot password?</a>
            </div>
            {% if form.errors %}
            <div class="alert alert-danger mb-3">Invalid username or password.</div>
            {% endif %}
            <button type="submit" class="btn btn-primary w-100" style="padding: 0.85rem;">Sign In <i class="bi bi-arrow-right ms-1"></i></button>
          </form>
          <p class="text-center mt-4" style="color: var(--text-muted);">
            No account yet? <a href="{% url 'register' %}" style="color: var(--accent);">Create one free</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
