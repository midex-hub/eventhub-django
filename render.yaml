services:
  - type: web
    name: eventhub
    env: python
    rootDir: event_management
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && gunicorn event_management.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eventhub_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: USE_CLOUDINARY
        value: "True"
      - key: CLOUDINARY_CLOUD_NAME
        value: "dqf5gwaus"
      - key: CLOUDINARY_API_KEY
        value: "796246568861258"
      - key: CLOUDINARY_API_SECRET
        value: "ACM3VlwOqiVjCKqWJ_y_JhklUHo"
      - key: EMAIL_HOST_USER
        value: "filaniisaac62@gmail.com"
      - key: EMAIL_HOST_PASSWORD
        value: "ysrdgoosplbpvgku"
      - key: DEFAULT_FROM_EMAIL
        value: "EventHub <filaniisaac62@gmail.com>"


databases:
  - name: eventhub_db
    plan: free
