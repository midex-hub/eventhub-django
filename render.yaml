services:
  - type: web
    name: eventhub
    env: python
    rootDir: event_management
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn event_management.wsgi:application --chdir event_management
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eventhub_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: eventhub_db
    plan: free
