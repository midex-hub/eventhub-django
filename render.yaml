services:
  - type: web
    name: eventhub
    env: python
    rootDir: event_management
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn event_management.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eventhub_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: USE_CLOUDINARY
        value: "False"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: eventhub_db
    plan: free
